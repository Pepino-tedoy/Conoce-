<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compositor de Publicaciones Creativo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
    body {
      margin: 0; padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f72585, #720026);
      color: #fff;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #1a1a1a;
      border-radius: 15px;
      padding: 25px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 0 30px rgba(247, 37, 133, 0.7);
      display: flex; flex-direction: column; gap: 18px;
    }
    h1 {
      text-align: center;
      color: #f72585;
      margin-bottom: 10px;
      font-weight: 700;
    }
    textarea {
      width: 100%;
      resize: vertical;
      min-height: 100px;
      border-radius: 10px;
      border: none;
      padding: 15px;
      font-size: 1rem;
      background: #333;
      color: #fff;
      box-shadow: inset 0 0 6px #f72585;
    }
    input[type="file"] {
      color: #f72585;
      font-weight: 600;
    }
    .preview {
      border: 2px solid #f72585;
      border-radius: 12px;
      padding: 10px;
      background: #2e2e2e;
      min-height: 150px;
      overflow-wrap: break-word;
    }
    .preview img, .preview video {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
      display: block;
    }
    .btn {
      background: #f72585;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
      box-shadow: 0 0 8px #f72585;
    }
    .btn:hover {
      background: #bd1550;
      box-shadow: 0 0 15px #bd1550;
    }
    .btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
    }
    .share-btn {
      background: #4cc9f0;
      box-shadow: 0 0 8px #4cc9f0;
    }
    .share-btn:hover {
      background: #3a9ad9;
      box-shadow: 0 0 15px #3a9ad9;
    }
    .footer {
      font-size: 0.85rem;
      text-align: center;
      color: #bbb;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Compositor de Publicaciones</h1>
    <textarea id="postText" placeholder="¿Qué quieres compartir?"></textarea>
    <input type="file" id="mediaInput" accept="image/*,video/*" />
    <div class="preview" id="preview"></div>
    <button class="btn" id="publishBtn" disabled>Publicar</button>
    <button class="btn share-btn" id="shareBtn" disabled>Compartir</button>
    <div class="footer">Creado con Supabase gratuito para almacenamiento y base de datos</div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Configura tu URL y KEY de Supabase aquí:
    const SUPABASE_URL = 'https://qegtsaslsseqiwwhfbhg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZ3RzYXNsc3NlcWl3d2hmYmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTA1NzYsImV4cCI6MjA5OTE2NjU3Nn0.s5Yd9uE4BdyU_1l7sgrxl0-8PjMsXMggTw-S0iqm-hM';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const postText = document.getElementById('postText');
    const mediaInput = document.getElementById('mediaInput');
    const preview = document.getElementById('preview');
    const publishBtn = document.getElementById('publishBtn');
    const shareBtn = document.getElementById('shareBtn');

    let selectedFile = null;
    let uploadedFileUrl = null;

    // Actualizar estado del botón publicar
    function updatePublishButton() {
      publishBtn.disabled = !(postText.value.trim() || selectedFile);
      shareBtn.disabled = true;
    }

    postText.addEventListener('input', updatePublishButton);

    mediaInput.addEventListener('change', () => {
      const file = mediaInput.files[0];
      selectedFile = file || null;
      preview.innerHTML = '';

      if (!file) {
        updatePublishButton();
        return;
      }

      const fileType = file.type;
      const reader = new FileReader();

      reader.onload = () => {
        if (fileType.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = reader.result;
          preview.appendChild(img);
        } else if (fileType.startsWith('video/')) {
          const video = document.createElement('video');
          video.src = reader.result;
          video.controls = true;
          preview.appendChild(video);
        }
        updatePublishButton();
      };
      reader.readAsDataURL(file);
    });

    async function uploadFile(file) {
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      const filePath = `publicaciones/${fileName}`;

      let { data, error } = await supabase.storage
        .from('profile-media')
        .upload(filePath, file, {
          cacheControl: '3600',
          upsert: false,
          contentType: file.type
        });

      if (error) {
        alert('Error subiendo archivo: ' + error.message);
        return null;
      }
      // Obtener URL pública
      const { publicURL, error: urlError } = supabase.storage.from('profile-media').getPublicUrl(filePath);
      if (urlError) {
        alert('Error obteniendo URL: ' + urlError.message);
        return null;
      }
      return publicURL;
    }

    publishBtn.addEventListener('click', async () => {
      publishBtn.disabled = true;
      publishBtn.textContent = 'Publicando...';

      if (selectedFile) {
        uploadedFileUrl = await uploadFile(selectedFile);
        if (!uploadedFileUrl) {
          publishBtn.disabled = false;
          publishBtn.textContent = 'Publicar';
          return;
        }
      }

      // Guardar publicación en tabla Supabase 'posts'
      const { data, error } = await supabase.from('posts').insert([
        {
          content: postText.value.trim(),
          media_url: uploadedFileUrl || null,
          created_at: new Date().toISOString()
        }
      ]);

      if (error) {
        alert('Error guardando publicación: ' + error.message);
        publishBtn.disabled = false;
        publishBtn.textContent = 'Publicar';
        return;
      }

      alert('¡Publicación creada con éxito!');
      postText.value = '';
      mediaInput.value = '';
      preview.innerHTML = '';
      uploadedFileUrl = null;
      selectedFile = null;
      publishBtn.textContent = 'Publicar';
      updatePublishButton();
      shareBtn.disabled = false;
    });

    shareBtn.addEventListener('click', async () => {
      if (!navigator.share) {
        alert('La función de compartir no está soportada en este navegador.');
        return;
      }
      try {
        await navigator.share({
          title: 'Mira mi publicación',
          text: postText.value,
          url: uploadedFileUrl || window.location.href
        });
      } catch (err) {
        console.log('Error compartiendo:', err);
      }
    });

    updatePublishButton();
  </script>
</body>
</html>
