<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Social Dinámica - Don Smaily Chickles</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B8B;
            --secondary: #6A5ACD;
            --accent: #00D4AA;
            --background: #1A1A2E;
            --card-bg: #16213E;
            --text: #FFFFFF;
            --text-secondary: #B0B0D0;
            --shadow: rgba(0, 0, 0, 0.3);
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 20px;
            background: var(--gradient);
            box-shadow: 0 10px 30px var(--shadow);
            animation: headerGlow 3s infinite alternate;
        }

        @keyframes headerGlow {
            0% { box-shadow: 0 10px 30px var(--shadow); }
            100% { box-shadow: 0 10px 40px rgba(255, 107, 139, 0.5); }
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 var(--secondary);
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text);
            opacity: 0.9;
        }

        .composer {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px var(--shadow);
            border: 2px solid var(--secondary);
            transition: transform 0.3s ease;
        }

        .composer:hover {
            transform: translateY(-5px);
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin-right: 15px;
            border: 3px solid var(--accent);
        }

        .username {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .composer textarea {
            width: 100%;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            font-size: 1.1rem;
            color: var(--text);
            resize: none;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .composer textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.3);
        }

        .media-upload {
            margin-bottom: 15px;
        }

        .upload-label {
            display: inline-block;
            background: var(--gradient);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .upload-label:hover {
            transform: scale(1.05);
        }

        .upload-label i {
            margin-right: 8px;
        }

        .file-name {
            display: inline-block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .preview-container {
            margin-top: 15px;
            display: none;
        }

        .preview-container img, .preview-container video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 2px solid var(--primary);
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .btn-post {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-post:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 139, 0.4);
        }

        .btn-post i {
            margin-right: 8px;
        }

        .reaction-selector {
            display: flex;
            gap: 10px;
        }

        .reaction-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .reaction-btn:hover, .reaction-btn.active {
            background: var(--primary);
            transform: scale(1.2);
        }

        .selected-reaction {
            font-size: 1.5rem;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .post {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px var(--shadow);
            border-left: 5px solid var(--primary);
            transition: transform 0.3s ease;
        }

        .post:hover {
            transform: translateY(-3px);
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.4rem;
        }

        .post-user {
            font-family: 'Poppins', sans-serif;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .post-time {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .post-content {
            margin-bottom: 15px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .post-media {
            margin-bottom: 15px;
            text-align: center;
        }

        .post-media img, .post-media video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            border: 2px solid var(--secondary);
        }

        .post-stats {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .post-actions-bar {
            display: flex;
            justify-content: space-around;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .action-btn:hover, .action-btn.liked {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--accent);
        }

        .action-btn i {
            margin-right: 8px;
        }

        .comments-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .comment {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .comment-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .comment-content {
            flex-grow: 1;
        }

        .comment-user {
            font-weight: bold;
            color: var(--accent);
            font-size: 0.95rem;
        }

        .comment-text {
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .add-comment {
            display: flex;
            margin-top: 15px;
        }

        .add-comment input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--secondary);
            border-radius: 20px;
            padding: 10px 15px;
            color: var(--text);
            font-size: 0.9rem;
        }

        .add-comment input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .add-comment button {
            background: var(--gradient);
            border: none;
            color: white;
            border-radius: 20px;
            padding: 0 20px;
            margin-left: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-comment button:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gradient);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px var(--shadow);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .post-actions-bar {
                flex-wrap: wrap;
                gap: 5px;
            }
            
            .action-btn {
                font-size: 0.9rem;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SocialFlow</h1>
            <p class="tagline">Comparte tus momentos con el mundo</p>
        </header>

        <div class="composer">
            <div class="user-info">
                <div class="avatar">DS</div>
                <div>
                    <div class="username">Don Smaily Chickles</div>
                    <div class="user-status">Publicando desde SocialFlow</div>
                </div>
            </div>
            
            <textarea id="postContent" placeholder="¿Qué estás pensando, Don Smaily? ¡Compártelo con el mundo!"></textarea>
            
            <div class="media-upload">
                <label for="mediaUpload" class="upload-label">
                    <i class="fas fa-image"></i> Foto/Video
                </label>
                <input type="file" id="mediaUpload" accept="image/*,video/*" style="display: none;">
                <span id="fileName" class="file-name"></span>
                <div id="previewContainer" class="preview-container"></div>
            </div>
            
            <div class="reaction-selector">
                <div class="reaction-btn" data-reaction="❤️">❤️</div>
                <div class="reaction-btn" data-reaction="😂">😂</div>
                <div class="reaction-btn" data-reaction="😮">😮</div>
                <div class="reaction-btn" data-reaction="😢">😢</div>
                <div class="reaction-btn" data-reaction="👍">👍</div>
            </div>
            
            <div class="post-actions">
                <div>
                    <button id="btnPost" class="btn-post">
                        <i class="fas fa-paper-plane"></i> Publicar
                    </button>
                </div>
                <div id="selectedReaction" class="selected-reaction"></div>
            </div>
        </div>

        <div id="postsContainer" class="posts-container">
            <div class="loading" id="loadingIndicator">
                <i class="fas fa-spinner fa-spin"></i> Cargando publicaciones...
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    /*
      IMPORTANTE:
      Reemplaza estos valores con los de tu proyecto de Supabase.

      Supabase > Project Settings > API
    */
        const SUPABASE_URL = 'https://pxtvlbujdmmelwbjrxqd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bY0OfnqwLsYQkuipvxj39g_QdvHtfii';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Datos del usuario actual
        const currentUser = {
            id: 'user_1',
            name: 'Don Smaily Chickles',
            avatar: 'DS'
        };

        // Elementos del DOM
        const postContent = document.getElementById('postContent');
        const mediaUpload = document.getElementById('mediaUpload');
        const fileName = document.getElementById('fileName');
        const previewContainer = document.getElementById('previewContainer');
        const btnPost = document.getElementById('btnPost');
        const postsContainer = document.getElementById('postsContainer');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const notification = document.getElementById('notification');
        const reactionBtns = document.querySelectorAll('.reaction-btn');
        const selectedReactionEl = document.getElementById('selectedReaction');

        let selectedReaction = null;
        let mediaFile = null;

        // 📸 Vista previa de archivos
        mediaUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            mediaFile = file;
            fileName.textContent = file.name;
            previewContainer.innerHTML = '';
            previewContainer.style.display = 'block';

            if (file.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                previewContainer.appendChild(img);
            } else if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.controls = true;
                previewContainer.appendChild(video);
            }
        });

        // 😊 Seleccionar reacción predeterminada
        reactionBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                reactionBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedReaction = btn.dataset.reaction;
                selectedReactionEl.textContent = selectedReaction;
            });
        });

        // 📤 Subir archivo a Supabase Storage
        async function uploadMedia(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `posts/${fileName}`;

            const { data, error } = await supabase.storage
                .from('media')
                .upload(filePath, file);

            if (error) throw error;

            const { data: { publicUrl } } = supabase.storage
                .from('media')
                .getPublicUrl(filePath);

            return publicUrl;
        }

        // ✍️ Crear nueva publicación
        async function createPost() {
            const content = postContent.value.trim();
            if (!content && !mediaFile) {
                showNotification('Escribe algo o sube un archivo para publicar', 'error');
                return;
            }

            btnPost.disabled = true;
            btnPost.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publicando...';

            try {
                let mediaUrl = null;
                if (mediaFile) {
                    mediaUrl = await uploadMedia(mediaFile);
                }

                const newPost = {
                    user_id: currentUser.id,
                    user_name: currentUser.name,
                    user_avatar: currentUser.avatar,
                    content: content,
                    media_url: mediaUrl,
                    media_type: mediaFile ? mediaFile.type.split('/')[0] : null,
                    default_reaction: selectedReaction,
                    likes: 0,
                    comments_count: 0
                };

                const { data, error } = await supabase
                    .from('posts')
                    .insert([newPost])
                    .select();

                if (error) throw error;

                showNotification('¡Publicación exitosa! 🎉', 'success');
                resetForm();
                loadPosts();

            } catch (error) {
                console.error('Error al publicar:', error);
                showNotification('Error al publicar: ' + error.message, 'error');
            } finally {
                btnPost.disabled = false;
                btnPost.innerHTML = '<i class="fas fa-paper-plane"></i> Publicar';
            }
        }

        // 📄 Cargar todas las publicaciones
        async function loadPosts() {
            loadingIndicator.style.display = 'block';
            postsContainer.innerHTML = '';

            try {
                const { data: posts, error } = await supabase
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (posts.length === 0) {
                    postsContainer.innerHTML = '<p class="loading">¡Sé el primero en publicar algo! ✨</p>';
                    return;
                }

                posts.forEach(post => renderPost(post));

            } catch (error) {
                console.error('Error al cargar publicaciones:', error);
                postsContainer.innerHTML = '<p class="loading">Error al cargar las publicaciones</p>';
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }

        // 🎨 Renderizar una publicación en el HTML
        function renderPost(post) {
            const postEl = document.createElement('div');
            postEl.className = 'post';
            postEl.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">${post.user_avatar}</div>
                    <div>
                        <div class="post-user">${post.user_name}</div>
                        <div class="post-time">${formatDate(post.created_at)}</div>
                    </div>
                </div>

                ${post.content ? `<div class="post-content">${post.content}</div>` : ''}

                ${post.media_url ? `
                    <div class="post-media">
                        ${post.media_type === 'image' 
                            ? `<img src="${post.media_url}" alt="Imagen de la publicación">` 
                            : `<video src="${post.media_url}" controls></video>`
                        }
                    </div>
                ` : ''}

                <div class="post-stats">
                    <span>${post.likes} ${post.default_reaction || '❤️'}</span>
                    <span>${post.comments_count} comentarios</span>
                </div>

                <div class="post-actions-bar">
                    <button class="action-btn like-btn" data-id="${post.id}">
                        <i class="fas fa-heart"></i> Me gusta
                    </button>
                    <button class="action-btn comment-btn" data-id="${post.id}">
                        <i class="fas fa-comment"></i> Comentar
                    </button>
                    <button class="action-btn">
                        <i class="fas fa-share"></i> Compartir
                    </button>
                </div>

                <div class="comments-section" id="comments-${post.id}">
                    <div class="comments-list" data-post-id="${post.id}"></div>
                    <div class="add-comment">
                        <input type="text" placeholder="Escribe un comentario..." class="comment-input" data-id="${post.id}">
                        <button class="send-comment" data-id="${post.id}">Enviar</button>
                    </div>
                </div>
            `;

            postsContainer.appendChild(postEl);
        }

        // 📅 Formatear fecha
        function formatDate(dateString) {
            const date = new Date(dateString);
            return new Intl.DateTimeFormat('es-MX', {
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            }).format(date);
        }

        // 🔔 Mostrar notificaciones
        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.style.display = 'block';
            notification.style.background = type === 'success' 
                ? 'var(--gradient)' 
                : 'linear-gradient(135deg, #ff4757, #ff3838)';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // 🔄 Reiniciar formulario
        function resetForm() {
            postContent.value = '';
            mediaUpload.value = '';
            fileName.textContent = '';
            previewContainer.innerHTML = '';
            previewContainer.style.display = 'none';
            selectedReaction = null;
            selectedReactionEl.textContent = '';
            reactionBtns.forEach(b => b.classList.remove('active'));
        }

        // 🎯 Eventos
        btnPost.addEventListener('click', createPost);

        // Delegación de eventos para publicaciones dinámicas
        postsContainer.addEventListener('click', async (e) => {
            // Me gusta
            if (e.target.closest('.like-btn')) {
                const btn = e.target.closest('.like-btn');
                const postId = btn.dataset.id;
                btn.classList.toggle('liked');
                
                const { error } = await supabase.rpc('increment_likes', { post_id: postId });
                if (!error) loadPosts();
            }

            // Mostrar/ocultar comentarios
            if (e.target.closest('.comment-btn')) {
                const postId = e.target.closest('.comment-btn').dataset.id;
                const commentsSection = document.getElementById(`comments-${postId}`);
                commentsSection.style.display = commentsSection.style.display === 'block' ? 'none' : 'block';
            }

            // Enviar comentario
            if (e.target.closest('.send-comment')) {
                const postId = e.target.closest('.send-comment').dataset.id;
                const input = document.querySelector(`.comment-input[data-id="${postId}"]`);
                const text = input.value.trim();
                
                if (!text) return;

                await supabase.from('comments').insert([{
                    post_id: postId,
                    user_name: currentUser.name,
                    user_avatar: currentUser.avatar,
                    content: text
                }]);

                input.value = '';
                loadPosts();
            }
        });

        // 🚀 Iniciar aplicación
        loadPosts();
    </script>
</body>
</html>
